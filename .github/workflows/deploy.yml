name: Server Deploy

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
    backend-build:
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - name: Code Clone
              uses: actions/checkout@v4

            - name: GitHub Container Registry Login
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Lowercase Repository Name
              run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

            - name: Build and Push Backend Docker Image
              uses: docker/build-push-action@v5
              with:
                context: ./backend
                push: true
                tags: ghcr.io/${{ env.REPO_LC }}/baam2-backend:latest

    frontend-build:
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - name: Code Clone
              uses: actions/checkout@v4

            - name: GitHub Container Registry Login
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Lowercase Repository Name
              run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

            - name: Build and Push Frontend Docker Image
              uses: docker/build-push-action@v5
              with:
                context: ./frontend
                push: true
                tags: ghcr.io/${{ env.REPO_LC }}/baam2-frontend:latest

    deploy:
        if: github.ref == 'refs/heads/main'
        runs-on: self-hosted
        needs: [backend-build, frontend-build]
        steps:
            - name: Deploy to Server
              run: |
                cd /home/runner/baam2.0
                docker compose pull
                docker compose up -d
                  