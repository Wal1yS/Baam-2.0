spring.application.name=baam2
spring.profiles.active=local
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/docs
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true

spring.jpa.hibernate.ddl-auto=update
server.port=8080

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=5m
server.servlet.session.tracking-modes=cookie

# OTP yandex configuration
spring.mail.host=smtp.yandex.ru
spring.mail.port=465


#email for sending OTP messages
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.yandex.ru
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=true
spring.mail.protocol=smtp
logging.level.org.springframework.security=DEBUG

#email for receiving not sent messages
spring.mail.properties.mail.smtp.from=stepanmurav@yandex.ru
